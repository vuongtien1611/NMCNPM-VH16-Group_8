<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login</title>
        <style>
            body {
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #f4f7f6;
            }

            .login-card {
                background: white;
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                width: 350px;
            }

            .login-card h2 {
                text-align: center;
                margin-bottom: 25px;
                color: #3498db;
            }

            .input-group {
                margin-bottom: 15px;
            }

            .input-group label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }

            .input-group input {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 5px;
                box-sizing: border-box;
            }

            .btn-submit {
                width: 100%;
                padding: 12px;
                background: #3498db;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px;
                margin-top: 10px;
            }

            .btn-submit:hover {
                background: #1557b0;
            }
        </style>
    </head>
    <body>
        <div class="login-card">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="admin@example.com"
                        required
                    />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input
                        type="text"
                        id="password"
                        placeholder="******"
                        required
                    />
                </div>
                <button type="submit" class="btn-submit">Đăng nhập</button>
            </form>
        </div>
        <script type="module" src="./js/login.js"></script>
    </body>
</html>
